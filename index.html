.quick::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.tier{background:rgba(20,16,42,.6);border:1px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;transition:all .2s}
.tier:hover{border-color:rgba(212,168,83,.4)}

.tier .amt{font-size:1.5em;font-weight:800;color:var(--text);margin:6px 0}
.tier .btn-sm{width:100%;padding:8px;border-radius:8px;border:none;font-weight:700;font-size:.78em;cursor:pointer;margin-top:4px;background:linear-gradient(135deg,var(--gold),#b8913a);color:#0a0815;transition:all .2s}
.tier .btn-sm:hover{transform:translateY(-1px)}
.loading{text-align:center;padding:30px;display:none}.loading.on{display:block}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}@keyframes spin{to{transform:rotate(360deg)}}
.mbti-option{display:flex;gap:8px;margin:8px 0}.mbti-option button{flex:1;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:.9em;transition:all .2s}.mbti-option button:hover{border-color:var(--blue);background:rgba(96,165,250,.08)}

function setLang(l){LOC=l;localStorage.setItem('lang',l);document.querySelectorAll('[id^=lang-]').forEach(function(b){b.style.borderColor=b.id==='lang-'+l?'var(--gold)':'var(--border)';b.style.color=b.id==='lang-'+l?'var(--gold)':'var(--muted)'});init();}

async function init(){try{var r=await fetch('/api/systems');var d=await r.json();S=d.core;A=d.auxiliary;var icons={bazi:'🪷',ziwei:'⭐',liuyao:'🪙',meihua:'🌸',qimen:'🗺️',daliuren:'🔮',taiyi:'🌌',tarot:'🃏',astrology:'✨',almanac:'📅',xiaoliuren:'✋'};document.getElementById('grid').innerHTML=S.map(function(s){return '<div class=sys onclick=openSys(\''+s.id+'\')><div class=icon>'+(icons[s.id]||'🔮')+'</div><h3>'+s.name+'</h3><p>'+s.desc+'</p></div>';}).join('');document.getElementById('auxGrid').innerHTML=A.map(function(a){return '<span class=aux-tag>'+a.name+'</span>';}).join('');}catch(e){}}
function openSys(i){var s=S.find(function(x){return x.id===i});if(!s)return;document.getElementById('modal').className='modal on';document.getElementById('modalTitle').textContent=s.name;document.getElementById('resultArea').innerHTML='';document.getElementById('loading').className='loading';var h='<p style=color:var(--muted);margin-bottom:14px;font-size:.88em>'+s.desc+'</p>';h+='<div class=input-group><label>姓名</label><input id=inp_name></div>';h+='<div class=row2><div class=input-group><label>出生日期</label><input id=inp_birthDate type=date></div><div class=input-group><label>出生时间</label><input id=inp_birthTime type=time value=12:00></div></div>';s.inputs.forEach(function(k){h+='<div class=input-group><label>'+k+'</label><input id=inp_'+k+' placeholder='+k+'></div>';});h+='<button class=btn onclick=calc(\''+i+'\')>开始占算</button>';document.getElementById('modalBody').innerHTML=h;}

async function calc(i){document.getElementById('loading').className='loading on';document.getElementById('resultArea').innerHTML='';var s=S.find(function(x){return x.id===i});var b={};s.inputs.forEach(function(k){var v=document.getElementById('inp_'+k).value;if(v)b[k]=v});try{var r=await fetch('/api/'+i,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});var d=await r.json();document.getElementById('loading').className='loading';if(d.error){document.getElementById('resultArea').innerHTML='<div class=\"result on\" style=color:#e05a5a>'+d.error+'</div>';return}var t=typeof d.result==='object'?JSON.stringify(d.result,null,2):d.result;var preview=t.substring(0,700);var auxNames=d.auxiliary_refs.map(function(a){return a.name;}).join(' · ');document.getElementById('resultArea').innerHTML='<div style=background:rgba(10,8,25,.8);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px><strong style=color:var(--muted);font-size:.78em>免费预览 — '+d.systemName+'</strong><div class=\"result on\" style=max-height:200px;margin-top:8px>'+preview+(t.length>700?'... (完整报告共'+t.length+'字符)':'')+'</div></div><div style=margin-top:16px><strong style=font-size:.88em;color:var(--gold)>选择解读深度</strong></div><div class=tier-row>'+TIERS.map(function(t){return '<div class=tier><h4>'+t.label+'</h4><div class=amt>$'+t.p+'</div><p style=font-size:.64em;color:var(--muted)>'+t.extra+'</p><button class=\"btn-sm\" onclick=window.open(\"'+PAY[t.p]+'\",\"_blank\")>购买</button></div>';}).join('')+'</div><p style=font-size:.7em;color:var(--muted);text-align:center;margin-top:10px>'+auxNames+' 等 '+d.auxiliary_refs.length+' 种辅助体系交叉推理</p>';}catch(e){document.getElementById('loading').className='loading';document.getElementById('resultArea').innerHTML='<div class=\"result on\" style=color:#e05a5a>网络错误</div>'}}

var mbtiState={step:0,scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};
function mbtiQuiz(){mbtiState={step:0,scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};document.getElementById('modal').className='modal on';document.getElementById('modalTitle').textContent='🧠 MBTI 人格测试';document.getElementById('resultArea').innerHTML='';showMBTIQ();}
function showMBTIQ(){var q=MBTI_Q[mbtiState.step];document.getElementById('modalBody').innerHTML='<p style=color:var(--muted);font-size:.8em;margin-bottom:10px>问题 '+(mbtiState.step+1)+'/'+MBTI_Q.length+'</p><p style=margin-bottom:12px>'+q.q+'</p><div class=mbti-option><button onclick=mbtiAnswer(\"a\")>'+q.a+'</button><button onclick=mbtiAnswer(\"b\")>'+q.b+'</button></div>';}
function mbtiAnswer(c){var q=MBTI_Q[mbtiState.step];if(c==='a')mbtiState.scores[q.d[0]]++;else mbtiState.scores[q.d[1]]++;mbtiState.step++;if(mbtiState.step>=MBTI_Q.length){showMBTIResult();return}showMBTIQ();}
function showMBTIResult(){var s=mbtiState.scores;var type=(s.E>s.I?'E':'I')+(s.S>s.N?'S':'N')+(s.T>s.F?'T':'F')+(s.J>s.P?'J':'P');var name=MBTI_TYPES[type]||type;var desc=MBTI_DESC[type]||'';document.getElementById('modalBody').innerHTML='';document.getElementById('resultArea').innerHTML='<div class=\"result on\" style=text-align:center><div style=font-size:3em>🧠</div><h2 style=color:var(--blue);font-size:1.6em;margin:8px 0>'+type+' — '+name+'</h2><p style=line-height:1.7>'+desc+'</p><div style=margin-top:14px;padding:14px;background:rgba(20,16,42,.6);border-radius:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center><div><strong>'+(s.E>s.I?'E':'I')+'</strong><br><small style=color:var(--muted)>'+(s.E>s.I?'外向':'内向')+'</small></div><div><strong>'+(s.S>s.N?'S':'N')+'</strong><br><small style=color:var(--muted)>'+(s.S>s.N?'实感':'直觉')+'</small></div><div><strong>'+(s.T>s.F?'T':'F')+'</strong><br><small style=color:var(--muted)>'+(s.T>s.F?'理性':'感性')+'</small></div><div><strong>'+(s.J>s.P?'J':'P')+'</strong><br><small style=color:var(--muted)>'+(s.J>s.P?'计划':'随性')+'</small></div></div></div>';}
init();
</script>
</body>
</html>
