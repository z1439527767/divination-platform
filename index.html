<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>命理堂 — 全球AI命理平台</title>
<style>
:root{--bg:#0a0a0f;--card:#13131f;--gold:#c9a96e;--text:#d4c5b2;--muted:#6b5e4e;--border:#2a2520;--green:#22c55e;--pink:#ec4899;--blue:#38bdf8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,"PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
.hero{text-align:center;padding:50px 0 30px}
.hero h1{font-size:2.8em;color:var(--gold);letter-spacing:.05em}
.hero .sub{color:var(--muted);font-size:1.05em;margin-top:6px}
.bar{text-align:center;padding:10px;background:linear-gradient(90deg,#1a1a2e,#2a2520,#1a1a2e);border-radius:10px;margin-bottom:20px;font-size:.85em;color:var(--muted)}
.bar strong{color:var(--gold)}
/* Interactive quick-access cards */
.quick-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 30px}
.quick{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s}
.quick:hover{border-color:var(--gold);transform:translateY(-2px)}
.quick .icon{font-size:2em;margin-bottom:8px}
.quick h3{font-size:1em;color:var(--text)}
.quick p{font-size:.8em;color:var(--muted);margin-top:4px}
.quick.mbti{border-color:var(--blue)}.quick.love{border-color:var(--pink)}.quick.daily{border-color:var(--green)}
/* Main systems grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin:20px 0}
.sys{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:.2s;text-align:center}
.sys:hover{border-color:var(--gold);transform:translateY(-1px)}
.sys .icon{font-size:1.5em}
.sys h3{color:var(--gold);font-size:.95em;margin:6px 0 4px}
.sys p{color:var(--muted);font-size:.72em}
.aux-section{margin:30px 0;padding:20px 0;border-top:1px solid var(--border)}
.aux-section h2{color:var(--gold);text-align:center;margin-bottom:12px;font-size:1.1em}
.aux-grid{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.aux-tag{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:.65em;color:var(--muted)}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:100;overflow-y:auto}
.modal.on{display:flex;align-items:flex-start;justify-content:center;padding:30px 16px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:520px;width:100%;margin-top:20px}
.mc h2{color:var(--gold);margin-bottom:16px}
.input-group{margin-bottom:10px}
.input-group label{display:block;color:var(--muted);margin-bottom:3px;font-size:.78em}
.input-group input,.input-group select{width:100%;padding:10px;background:#0a0a0f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9em}
.input-group input:focus,.input-group select:focus{border-color:var(--gold);outline:none}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),#a67c52);border:none;border-radius:10px;color:#0a0a0f;font-weight:700;font-size:1em;cursor:pointer;margin-top:6px}
.btn2{background:var(--green);color:#fff}
.btn3{background:var(--pink);color:#fff}
.btn4{background:var(--blue);color:#fff}
.close{float:right;background:none;border:none;color:var(--muted);font-size:1.3em;cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result{margin-top:16px;padding:18px;background:#0a0a0f;border-radius:10px;border:1px solid var(--border);white-space:pre-wrap;font-size:.82em;line-height:1.7;max-height:350px;overflow-y:auto;display:none}
.result.on{display:block}
.paywall{text-align:center;padding:25px;background:linear-gradient(135deg,#1a1a2e,#2a2520);border-radius:12px;border:2px solid var(--gold);margin-top:14px;display:none}
.paywall.on{display:block}
.paywall h3{color:var(--gold);font-size:1.2em}.paywall .price{font-size:2.2em;color:var(--gold);font-weight:800;margin:10px 0}.paywall p{color:var(--muted);margin-bottom:6px;font-size:.85em}
.tier-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.tier{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.tier h4{color:var(--gold);font-size:.9em}.tier .amt{font-size:1.6em;font-weight:800;color:var(--text);margin:6px 0}.tier .btn-sm{width:100%;padding:8px;border-radius:8px;border:none;font-weight:700;font-size:.8em;cursor:pointer;margin-top:4px}
.loading{text-align:center;padding:30px;display:none}.loading.on{display:block}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}@keyframes spin{to{transform:rotate(360deg)}}
.mbti-option{display:flex;gap:8px;margin:8px 0}.mbti-option button{flex:1;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:.9em}.mbti-option button:hover,.mbti-option button.sel{border-color:var(--blue);background:#1a2a3e}
</style>
</head>

<script>

// Zodiac luck for daily fortune
var ZODIAC=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
var LUCKY_COLORS=['#c9a96e','#ec4899','#38bdf8','#22c55e','#a855f7','#f97316','#ef4444','#eab308'];
var LUCKY_NUMS=function(){var a=[];for(var i=0;i<3;i++)a.push(Math.floor(Math.random()*99)+1);return a;};

async function init(){
  try{
    var r=await fetch('/api/systems');var d=await r.json();S=d.core;A=d.auxiliary;
    var icons={bazi:'🪷',ziwei:'⭐',liuyao:'🪙',meihua:'🌸',qimen:'🗺️',daliuren:'🔮',taiyi:'🌌',tarot:'🃏',astrology:'✨',almanac:'📅',xiaoliuren:'✋'};
    document.getElementById('grid').innerHTML=S.map(function(s){
      return '<div class="sys" onclick="openSys(\''+s.id+'\')"><div class="icon">'+(icons[s.id]||'🔮')+'</div><h3>'+s.name+'</h3><p>'+s.desc+'</p></div>';
    }).join('');
    document.getElementById('auxGrid').innerHTML=A.map(function(a){return '<span class="aux-tag">'+a.name+'</span>';}).join('');
  }catch(e){}
}

function openSys(i){
  var s=S.find(function(x){return x.id===i});if(!s)return;
  document.getElementById('modal').className='modal on';
  document.getElementById('modalTitle').textContent=s.name;
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('loading').className='loading';
  var h='<p style="color:var(--muted);margin-bottom:12px;font-size:.85em">'+s.desc+'</p>';
  s.inputs.forEach(function(k){
    var lb={birthYear:'出生年',birthMonth:'出生月',birthDay:'出生日',birthHour:'出生时(0-23)',birthMinute:'出生分',longitude:'经度',latitude:'纬度',gender:'性别(male/female)',coins:'铜钱(6次,逗号分隔)',count:'牌数(1-10)',upperTrigram:'上卦(1-8)',lowerTrigram:'下卦(1-8)',year:'年',month:'月',day:'日',hour:'时'}[k]||k;
    h+='<div class="input-group"><label>'+lb+'</label><input id="inp_'+k+'" placeholder="'+lb+'"></div>';
  });
  h+='<button class="btn" onclick="calc(\''+i+'\')">开始占算</button>';
  document.getElementById('modalBody').innerHTML=h;
}

function closeModal(){document.getElementById('modal').className='modal'}

async function calc(i){
  document.getElementById('loading').className='loading on';
  document.getElementById('resultArea').innerHTML='';
  var s=S.find(function(x){return x.id===i});var b={};
  s.inputs.forEach(function(k){var v=document.getElementById('inp_'+k).value;if(v)b[k]=v});
  try{
    var r=await fetch('/api/'+i,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
    var d=await r.json();document.getElementById('loading').className='loading';
    if(d.error){document.getElementById('resultArea').innerHTML='<div class="result on" style="color:#e05a5a">'+d.error+'</div>';return}
    lastResult=d;lastSys=i;
    var t=typeof d.result==='object'?JSON.stringify(d.result,null,2):d.result;
    var preview=t.substring(0,700);
    var auxNames=d.auxiliary_refs.map(function(a){return a.name;}).join(' · ');
    document.getElementById('resultArea').innerHTML=
      '<div style="background:#0a0a0f;border:1px dashed var(--border);border-radius:8px;padding:14px;margin-top:10px"><strong style="color:var(--muted);font-size:.8em">🆓 免费预览 — '+d.systemName+'</strong>'+
      '<div class="result on" style="max-height:200px;margin-top:8px">'+preview+(t.length>700?'\n... (完整报告共'+t.length+'字符)':'')+'</div></div>'+
      '<div style="margin-top:14px"><strong style="font-size:.85em;color:var(--gold)">选择解读深度：</strong></div>'+
      '<div class="tier-row">'+
      '<div class="tier"><h4>🔮 标准</h4><div class="amt">$30</div><p style="font-size:.7em;color:var(--muted)">5种辅助体系印证</p><button class="btn-sm btn" onclick="window.open(\''+PAY['30']+'\',\'_blank\')">购买</button></div>'+
      '<div class="tier"><h4>⭐ 深度</h4><div class="amt">$60</div><p style="font-size:.7em;color:var(--muted)">15种辅助+矛盾分析</p><button class="btn-sm btn btn2" onclick="window.open(\''+(PAY['60']||PAY['30'])+'\',\'_blank\')">购买</button></div>'+
      '<div class="tier"><h4>👑 终极</h4><div class="amt">$90</div><p style="font-size:.7em;color:var(--muted)">25种辅助+人生轨迹+PDF</p><button class="btn-sm btn btn3" onclick="window.open(\''+(PAY['90']||PAY['30'])+'\',\'_blank\')">购买</button></div>'+

  }catch(e){document.getElementById('loading').className='loading';document.getElementById('resultArea').innerHTML='<div class="result on" style="color:#e05a5a">网络错误</div>'}

// Daily Fortune

// MBTI Quiz
var mbtiState={step:0,scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};
function mbtiQuiz(){
  mbtiState={step:0,scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};
  document.getElementById('modal').className='modal on';
  document.getElementById('modalTitle').textContent='🧠 MBTI 人格测试';
  document.getElementById('resultArea').innerHTML='';
  showMBTIQ();
}
function showMBTIQ(){
  var q=MBTI_Q[mbtiState.step];
  var dims={E:'E',I:'I',S:'S',N:'N',T:'T',F:'F',J:'J',P:'P'};
  document.getElementById('modalBody').innerHTML='<p style="color:var(--muted);font-size:.8em;margin-bottom:10px">问题 '+(mbtiState.step+1)+'/'+MBTI_Q.length+'</p>'+
    '<p style="margin-bottom:12px">'+q.q+'</p>'+
    '<div class="mbti-option"><button onclick="mbtiAnswer(\\'a\\')">'+q.a+'</button><button onclick="mbtiAnswer(\\'b\\')">'+q.b+'</button></div>';
}
function mbtiAnswer(choice){
  var q=MBTI_Q[mbtiState.step];
  if(choice==='a')mbtiState.scores[q.d[0]]++;else mbtiState.scores[q.d[1]]++;
  mbtiState.step++;
  if(mbtiState.step>=MBTI_Q.length){showMBTIResult();return}
  showMBTIQ();
}
function showMBTIResult(){
  var s=mbtiState.scores;
  var type=(s.E>s.I?'E':'I')+(s.S>s.N?'S':'N')+(s.T>s.F?'T':'F')+(s.J>s.P?'J':'P');
  var name=MBTI_TYPES[type]||type;var desc=MBTI_DESC[type]||'';
  document.getElementById('modalBody').innerHTML='';
  document.getElementById('resultArea').innerHTML=
    '<div class="result on" style="text-align:center"><div style="font-size:3em">🧠</div>'+
    '<h2 style="color:var(--blue);font-size:1.6em;margin:8px 0">'+type+' — '+name+'</h2>'+
    '<p style="line-height:1.7">'+desc+'</p>'+
    '<div style="margin-top:12px;padding:12px;background:var(--card);border-radius:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center">'+
    '<div><strong>'+(s.E>s.I?'E':'I')+'</strong><br><small style="color:var(--muted)">'+(s.E>s.I?'外向':'内向')+'</small></div>'+
    '<div><strong>'+(s.S>s.N?'S':'N')+'</strong><br><small style="color:var(--muted)">'+(s.S>s.N?'实感':'直觉')+'</small></div>'+
    '<div><strong>'+(s.T>s.F?'T':'F')+'</strong><br><small style="color:var(--muted)">'+(s.T>s.F?'理性':'感性')+'</small></div>'+
    '<div><strong>'+(s.J>s.P?'J':'P')+'</strong><br><small style="color:var(--muted)">'+(s.J>s.P?'计划':'随性')+'</small></div>'+
    '</div>'+
    '<p style="font-size:.7em;color:var(--muted);margin-top:10px">想要深度命理分析？选择核心体系进行完整占算</p></div>';
}

// Love Match
function loveMatch(){
  document.getElementById('modal').className='modal on';
  document.getElementById('modalTitle').textContent='💕 CP 配对测试';
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('modalBody').innerHTML='<p style="color:var(--muted);font-size:.85em;margin-bottom:12px">输入两个人的名字和生日</p>'+
    '<div class="row2"><div class="input-group"><label>你的名字</label><input id="love1"></div><div class="input-group"><label>对方名字</label><input id="love2"></div></div>'+
    '<div class="row2"><div class="input-group"><label>你的生日</label><input id="love1b" type="date"></div><div class="input-group"><label>对方生日</label><input id="love2b" type="date"></div></div>'+
    '<button class="btn btn3" onclick="calcLove()">测试配对</button>';
}
function calcLove(){
  var n1=document.getElementById('love1').value||'你';var n2=document.getElementById('love2').value||'TA';
  var seed=(n1+n2).split('').reduce(function(a,c){return a+c.charCodeAt(0)},0);
  var score=50+Math.floor((seed%41));score=Math.min(98,Math.max(20,score));
  var emoji=score>85?'💘':score>70?'💕':score>55?'💖':score>40?'💗':'💔';
  var verdict=score>85?'天生一对！灵魂伴侣级别':score>70?'很配！好好珍惜':score>55?'还不错，需要磨合':score>40?'有点挑战，但不是不可能':'缘分尚浅，做朋友更好';
  var tips=score>70?'互补型关系，对方身上有你缺少的特质':score>50?'需要多沟通，理解彼此的差异':'保持开放心态，缘分有时出人意料';
  document.getElementById('resultArea').innerHTML=
    '<div class="result on" style="text-align:center"><div style="font-size:3em">'+emoji+'</div>'+
    '<h3 style="color:var(--pink);font-size:1.4em;margin:8px 0">'+n1+' ❤️ '+n2+'</h3>'+
    '<div style="font-size:2.5em;font-weight:800;color:var(--gold)">'+score+'%</div><p>'+verdict+'</p>'+
    '<p style="font-size:.8em;color:var(--muted);margin-top:8px">'+tips+'</p></div>';
}

init();
</script>
</body>
</html>
