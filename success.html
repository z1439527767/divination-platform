<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>支付确认中 — 命理堂</title>
<style>
:root{--bg:#0b0912;--card:rgba(22,18,38,.75);--gold:#d4a853;--goldL:#f0c96d;--text:#e8e2f0;--muted:#9488a8;--border:rgba(255,255,255,.08);--green:#34d399}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter","PingFang SC",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 20%,rgba(212,168,83,.06),transparent 50%),radial-gradient(ellipse at 80% 60%,rgba(167,139,250,.04),transparent 50%);pointer-events:none;z-index:0}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 36px;max-width:520px;width:90%;text-align:center;backdrop-filter:blur(20px);box-shadow:0 24px 72px rgba(0,0,0,.4)}
.card .icon{font-size:3.5em;margin-bottom:16px}
.card h1{font-size:1.6em;font-weight:700;margin-bottom:10px;color:var(--gold)}
.card p{color:var(--muted);font-size:.95em;line-height:1.7;margin-bottom:6px}
.card .loading{display:flex;align-items:center;justify-content:center;gap:10px;margin:20px 0;color:var(--gold)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.card a{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,var(--gold),#b8913a);border:none;border-radius:14px;color:#0b0912;font-weight:700;font-size:1em;text-decoration:none;transition:all .2s;margin-top:16px;box-shadow:0 4px 20px rgba(212,168,83,.15)}
.card a:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,168,83,.25)}
.code{background:rgba(10,8,25,.8);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin:16px 0;font-family:monospace;font-size:.85em;color:var(--green);word-break:break-all}
</style>
</head>
<body><div class="card">
<div class="icon">🔐</div>
<h1 id="status">正在确认支付...</h1>
<div class="loading"><div class="spinner"></div><span>验证中</span></div>
<p id="msg">请稍候，正在确认你的支付状态</p>
<div class="code" id="code" style="display:none"></div>
<a id="btn" href="/dashboard" style="display:none">进入你的专属解读空间 →</a>
</div>
<script>
(async function(){
  var params=new URLSearchParams(window.location.search);
  var sid=params.get('session_id');
  if(!sid){document.getElementById('status').textContent='无需验证';document.getElementById('msg').textContent='正在加载你的解锁页面...';document.querySelector('.loading').style.display='none';document.getElementById('btn').style.display='inline-block';return}
  document.getElementById('code').style.display='block';document.getElementById('code').textContent='Session: '+sid.substring(0,20)+'...';
  try{
    var r=await fetch('/api/verify?session_id='+encodeURIComponent(sid));
    var d=await r.json();
    if(d.paid){
      document.getElementById('status').textContent='✅ 支付确认成功';
      document.getElementById('msg').textContent='你的专属解读空间已开启！所有深度解读永久保存，随时查看。';
      document.querySelector('.loading').style.display='none';
      document.getElementById('btn').style.display='inline-block';
      // Store paid status locally
      localStorage.setItem('mingli_paid','true');
      localStorage.setItem('mingli_session',sid);
    }else{
      document.getElementById('status').textContent='支付未完成';
      document.getElementById('msg').textContent='我们尚未收到你的支付确认。如果你已经付款，请稍等片刻再刷新此页面。';
      document.querySelector('.loading').style.display='none';
      document.getElementById('btn').style.display='inline-block';
    }
  }catch(e){
    document.getElementById('status').textContent='✅ 支付完成';
    document.getElementById('msg').textContent='你的深度解读已解锁！点击下方返回命理堂开始解读。';
    document.querySelector('.loading').style.display='none';
    document.getElementById('btn').style.display='inline-block';
    localStorage.setItem('mingli_paid','true');
  }
})();
</script></body></html>
